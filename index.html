<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chennai Premium Estates | Vision 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="dark-theme">

    <nav class="glass-nav">
        <div class="logo">CHENNAI<span>PRIME</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#listings">Villas</a></li>
            <li><a href="locations/adyar.html">Explore Chennai</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content fade-in">
            <h1>Experience Luxury.</h1>
            <p>Premium Land & Villas across Chennai's elite corridors.</p>
            <a href="#listings" class="btn-audi">View Collection</a>
        </div>
    </section>

    <section id="listings" class="container">
        <h2 class="section-title">Exclusive Ads</h2>
        <div class="grid">
            <div class="card reveal">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=500&q=80')"></div>
                <div class="card-body">
                    <span class="tag">VILLA</span>
                    <h3>The ECR Beach House</h3>
                    <p>Modern architecture meets coastal serenity.</p>
                    <button class="btn-outline" onclick="showMap(12.948, 80.239)">Locate</button>
                </div>
            </div>
        </div>
    </section>

    <div id="map" class="map-frame reveal"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
